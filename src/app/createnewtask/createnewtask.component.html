<div class="phx-right-slide-modal modal fade" id="createnewTaskModal" tabindex="-1" role="dialog"
    aria-labelledby="myModalLabel">
    <div class="modal-dialog" role="document">
        <div class="modal-content myw-container px-0">
            <div class="modal-body pb-3">
                <form [formGroup]="createnewTaskForm" class="phx-formfix" (ngSubmit)="createTask()">
                    <button class="close phx-btnClose px-3" data-dismiss="modal" type="button">×</button>
                    <div class="phx-si-deliverpane-body">
                        <div class="row phx-mrgleft">
                            <div class="form-group mb-5 col-12 col-md-12 px-1">
                                <label class="required phx-titlefix phx-form-color" for="Message">Message</label>
                                <div>
                                    <input type="text" name="message" formControlName="message"
                                        class="form-control phx-title"
                                        [ngClass]="(createnewTaskForm.value?.Message?.length == 0 || ( (Message.dirty || Message.touched) && Message.invalid && Message.errors.pattern))? 'phx-title-danger-border' : 'phx-title-border'"
                                        placeholder="" title="{{createnewTaskForm.value.message}}"
                                        maxlength="{{taskservice.MessageMaxLength}}" required>
                                </div>
                                <span *ngIf="!createnewTaskForm.value?.message" class="phx-modal-error">Message is
                                    required</span>
                            </div>
                        </div>
                        <div class="row phx-mrgleft">
                            <div class="form-group mb-5 col-12">
                                <label for="" class="phx-form-color">
                                    Due_Date
                                </label>
                                <div>
                                    <input type="text" name="due_date" formControlName="due_date" class="form-control phx-duedate"
                                        title="{{createnewTaskForm.value.due_date}}" placeholder="">
                                </div>
                            </div>
                        </div>

                        <div class="row phx-mrgleft">
                            <div class="form-group mb-5 col-4 col-md-4 col-lg-3">
                                <label for="" class="phx-form-color">
                                    Priority
                                </label>
                                <div>
                                    <input type="number" name="priority"
                                         onkeydown="javascript: return event.keyCode == 69 ? false : true"
                                        formControlName="priority" min="1" max="3"
                                        title="{{createnewTaskForm.value.priority}}"
                                        class="form-control phx-border pl-0">
                                </div>
                            </div>
                        </div>

                        <div class="row phx-mrgleft">
                            <div class="form-group mb-5 col-4 col-md-4 col-lg-3">
                                <label for="" class="phx-form-color">
                                    Assigned_To
                                </label>
                                <div>
                                    <input type="number" name="assigned_to"
                                         onkeydown="javascript: return event.keyCode == 69 ? false : true"
                                        formControlName="assigned_to" min="1"
                                        title="{{createnewTaskForm.value.assigned_to}}"
                                        class="form-control phx-border pl-0">
                                </div>
                            </div>
                        </div>

                        <div class="row">
                            <input type="button" class="btn btn-secondary" value="Reset" (click)="resetForm()">
                            <input type="submit" class="btn ml-2 btn-primary" value="Create"
                                [disabled]="checkMandatoryVal()">
                        </div>
                    </div>
                </form>
            </div>
        </div>
        <!-- modal-content -->
    </div>
    <!-- modal-dialog -->
</div>

<div class="modal" id="assignTaskModal" tabindex="-1" role="dialog">
    <div class="modal-dialog phx-modal-assignTask modal-dialog-centered">
        <form>
            <div class="phx-modal-content phx-modal-position">
                <div class="modal-header phx-header-align myW-bg-clr">
                    <h5 class="modal-title assign-task-title">Assign Task</h5>
                    <button aria-label="Close" class="rc-close rc-panel-close" data-dismiss="modal" type="button">
                        <span aria-hidden="true" class="sr-only">Close</span>
                    </button>
                </div>
                <div class="modal-body phx-modal-body">
                    <div class="phx-detailView-body">
                        <div class="row">
                            <div class="form-group col-12 col-md-12">
                                <label class="myW-clr">Task ID</label>
                                <div class="phx-dropdown dropdown">
                                    <div class="phx-form-control form-control phx-dropdown-toggle
                                        dropdown-toggle" data-toggle="dropdown" aria-haspopup="true"
                                         aria-expanded="false" id="Methodology">
                                        {{selectedTaskId?selectedTaskId:'Select'}}
                                    </div>
                                    <div class="phx-dropdown-menu dropdown-menu" aria-labelledby="Methodology">
                                        <div class="phx-drop-item" *ngFor="let id of taskservice.getTaskIds">
                                            <a class="phx-drop-item-header" (click)="selectTaskId(id)">{{id}}</a>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="form-group col-12 col-md-12">
                                <label class="myW-clr">User Name</label>
                                <div class="phx-dropdown dropdown">
                                    <div class="phx-form-control form-control phx-dropdown-toggle
                                        dropdown-toggle"  data-toggle="dropdown" aria-haspopup="true"
                                         aria-expanded="false" id="Methodology">
                                        {{selectedUser?selectedUser:'Select'}}
                                    </div>
                                    <div class="phx-dropdown-menu dropdown-menu" aria-labelledby="Methodology">
                                        <div class="phx-drop-item" *ngFor="let user of users">
                                            <a class="phx-drop-item-header" (click)="selectUser(user.name,user.id)">{{user.name}}</a>
                                        </div>
                                    </div>
                                </div>

                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer phx-modal-footer">
                    <div class="row mb-20">
                        <div class="">
                            <input type="button" class="btn btn-secondary mr-2"
                                data-dismiss="modal" value="Cancel">
                            <input type="button" class="btn btn-primary"
                                data-dismiss="modal" value="Assign" (click)="assignTaskToUser()">
                        </div>
                    </div>
                </div>
            </div>
        </form>
    </div>
</div>

<div class="alert phx-alert-success alert-dismissible fade show" role="alert" *ngIf="successMessage">
    <div >
        {{AlertMessage}} 
    </div>
    <button type="button" class="close" data-dismiss="modal" aria-label="Close" (click)="toasterClose()">
        <span aria-hidden="true">&times;</span>
    </button>
</div>

<div class="alert phx-alert-danger alert-dismissible fade show" role="alert"  *ngIf="failureMessage">
    <div >
         {{AlertMessage}} 
    </div>
    <button type="button" class="close" data-dismiss="modal" aria-label="Close" (click)="toasterClose()">
        <span aria-hidden="true">&times;</span>
    </button>
</div>
